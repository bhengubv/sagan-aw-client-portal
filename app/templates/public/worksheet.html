{% extends "public/base.html" %}
{% block title %}Expense worksheet · AW Client Portal{% endblock %}
{% block body %}
<div class="card">
  <h1>Monthly expense worksheet</h1>
  <p class="muted">These figures set up your automated cash-flow. Round to whole dollars.</p>
  <form method="post">
    <div class="row">
      <div class="field"><label>Monthly take-home pay ($)</label><input name="salary" inputmode="decimal" required></div>
      <div class="field"><label>Agreed monthly budget ($)</label><input name="expense_budget" inputmode="decimal" required></div>
    </div>
    <div class="field"><label>Typical monthly expenses ($)</label><input name="expenses" inputmode="decimal"></div>
    <div class="field"><label>Insurance deductibles (comma-separated $)</label>
      <input name="deductibles" placeholder="1000, 2000, 1000"></div>
    <button class="btn" type="submit">Submit worksheet</button>
  </form>
</div>
{% endblock %}
